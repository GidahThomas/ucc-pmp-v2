version: '3.9'
services:
  db:
    image: postgres:16
    container_name: ucc_pmp_rebuild_db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ucc_pmp_rebuild
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
